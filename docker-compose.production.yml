version: '3.8'

services:
  atlas:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    volumes:
      - atlas-data:/app/data
      - atlas-uploads:/app/packages/server/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas.rule=Host(`${ATLAS_DOMAIN:-atlas.localhost}`)"
      - "traefik.http.routers.atlas.entrypoints=websecure"
      - "traefik.http.routers.atlas.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas.loadbalancer.server.port=3001"
    networks:
      - atlas-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_prod_password}
      POSTGRES_DB: atlas_platform
    volumes:
      - atlas-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-atlas_redis_password}
    volumes:
      - atlas-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atlas_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-net

  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=atlas-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - atlas-letsencrypt:/letsencrypt
    networks:
      - atlas-net

volumes:
  atlas-data:
  atlas-uploads:
  atlas-pg-data:
  atlas-redis-data:
  atlas-letsencrypt:

networks:
  atlas-net:
    driver: bridge
